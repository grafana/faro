components:
  schemas:
    Exception:
      description: holds all the data regarding an exception.
      type: object
      required:
        - timestamp
      properties:
        context:
          description: Arbitrary key-value context
          $ref: "#/components/schemas/ExceptionContext"
          x-go-type-skip-optional-pointer: true
        stacktrace:
          description: Stack trace
          $ref: "#/components/schemas/Stacktrace"
        timestamp:
          type: string
          description: Time the exception was captured
          format: date-time
        trace:
          description: Associated trace and span IDs
          $ref: "#/components/schemas/TraceContext"
          x-go-type-skip-optional-pointer: true
        type:
          type: string
          description: Exception class or type name
          x-go-type-skip-optional-pointer: true
        fatal:
          type: boolean
          description: >
            Whether this exception caused app termination (crash, ANR, OOM).
            Defaults to false when not set. Web exceptions are typically
            non-fatal; mobile SDKs set this for native crash reports.
          x-go-type-skip-optional-pointer: true
        fingerprint:
          type: string
          description: Custom grouping fingerprint
          x-go-type-skip-optional-pointer: true
        value:
          type: string
          description: Exception message
          x-go-type-skip-optional-pointer: true
        action:
          description: Associated user action
          $ref: "#/components/schemas/Action"
      x-go-type-skip-optional-pointer: true
