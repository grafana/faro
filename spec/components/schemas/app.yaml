components:
  schemas:
    App:
      type: object
      description: holds metadata about the application event originates from.
      properties:
        bundleId:
          type: string
          description: Bundle identifier (used by apps bundled with Faro bundler plugins)
          x-go-type-skip-optional-pointer: true
        gitHash:
          type: string
          description: Git hash of the application source code this telemetry was generated from
          x-go-type-skip-optional-pointer: true
        environment:
          type: string
          description: Deployment environment (e.g. `production`, `staging`)
          x-go-type-skip-optional-pointer: true
        installationId:
          type: string
          description: >
            Per-installation identifier (OTel: app.installation.id).
            Identical across launches of the same installed app; resets on
            uninstall/reinstall. Privacy-preserving alternative to device.id.
            On iOS, typically sourced from identifierForVendor.
          x-go-type-skip-optional-pointer: true
        name:
          type: string
          description: Application name
          x-go-type-skip-optional-pointer: true
        namespace:
          type: string
          description: Application namespace
          x-go-type-skip-optional-pointer: true
        release:
          type: string
          description: Release identifier
          x-go-type-skip-optional-pointer: true
        version:
          type: string
          description: Application version
          x-go-type-skip-optional-pointer: true
      x-go-type-skip-optional-pointer: true
